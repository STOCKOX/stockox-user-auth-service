spring:
  application:
    name: stockox-user-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

  mail:
    host: ${MAIL_HOST:smtp.zoho.in}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
        # Required for Zoho: prevents "553 Relaying disallowed" error
        from: ${MAIL_USERNAME}

  # Redis — declared in RedisConfig but never actually called in user-service
  # Health check disabled so startup doesn't fail if Redis is absent on Render
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8081}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  health:
    mail:
      enabled: false    # Don't fail /actuator/health if SMTP is slow
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    com.stockox: INFO
    org.springframework.mail: DEBUG  # Helps debug email delivery issues

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiry-ms: 900000       # 15 minutes
    refresh-expiry-ms: 604800000   # 7 days
  otp:
    expiry-minutes: 10
    length: 6
    max-attempts: 5
  app-name: "StockOx"
  frontend-url: ${FRONTEND_URL:https://www.stockox.co.in}